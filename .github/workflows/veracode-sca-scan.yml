name: Veracode Software Composition Analysis

run-name: Software Composition Analysis - ${{ github.event.client_payload.repository.name }}

concurrency:
  group: ${{ github.event.client_payload.event_type }}-${{ github.event.client_payload.repository.name }}-${{ github.event.client_payload.repository.branch }}
  cancel-in-progress: true

on:
  repository_dispatch:
    types: [veracode-sca-scan]

jobs:
  cleanup:
    uses: ./.github/workflows/veracode-clean-up.yml
    with:
      runs_on: ${{ github.event.client_payload.user_config.default_runs_on }}

  register:
    needs: cleanup
    uses: ./.github/workflows/veracode-check-run.yml
    with:
      check_run_name: ${{ github.workflow }}
      head_sha: ${{ github.event.client_payload.sha }}
      repository_owner: ${{ github.event.client_payload.repository.owner }}
      repository_name: ${{ github.event.client_payload.repository.name }}
      pull_request_num: ${{ github.event.client_payload.pr_number }}
      event_type: ${{ github.event.client_payload.event_type }}
      github_token: ${{ github.event.client_payload.token }}
      run_id: ${{ github.run_id }}
      branch: ${{ github.event.client_payload.repository.branch }}
      default_runs_on: ${{ github.event.client_payload.user_config.default_runs_on }}

  veracode-sca-scan:
    needs: [register]
    runs-on: ${{ fromJSON(github.event.client_payload.user_config.default_runs_on) }}
    name: Veracode Component Analysis
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.client_payload.repository.full_name }}
          ref: ${{ github.event.client_payload.repository.branch }}
          token: ${{ github.event.client_payload.token }}
      - uses: actions/checkout@v6
        with:
          path: 'veracode-helper'

      - name: Find yarn JS apps using workspaces - Linux
        if: contains(runner.os, 'Linux')
        run: |
          if [ -f "package.json" ] && [ -f "pnpm-lock.yaml" ] && [ -f "pnpm-workspace.yaml" ]; then
            echo "- The file package.json, pnpm-lock.yml and pnpm-workspace.yaml exist. This looks like a PNPM workspace project."
            if grep -q "workspaces" "package.json"; then
              echo "-- The package.json file contains workspaces - running PNPM lockfile generator"
          	  node veracode-helper/helper/pnpm-helper.js --folder '/home/runner/work/veracode/veracode' --intRepoPrefix '${{ github.event.client_payload.repository.owner }}' --repoName '${{ github.event.client_payload.repository.name }}'
            else
              echo "-- The package.json file does not contain workspace - this will fail - exiting"
            fi
          elif [ -f "package.json" ] && [ ! -f "pnpm-lock.yml" ] && [ ! -f "pnpm-workspace.yaml" ]; then
          	if grep -q "workspaces" "package.json"; then
          		echo "- The package.json file exists, and it contains 'workspaces'."
          		if grep -q "yarn" "package.json"; then
          			echo "-- Yarn was identified on the package.json file"
          			version=$(grep 'yarn' package.json | grep -oE '[0-9]' | head -n 1)
          			if [ -z "$version" ]; then
          				echo "-- The yarn version could not be identified."
          			else
          				echo "-- The yarn version is: $version"
          
          				if [ $version -lt "3" ]; then
          					echo "---- Running v2 lockfile generator"
          					node veracode-helper/helper/yarn-lock-file-generator-v2.js --folder /home/runner/work/veracode/veracode
          				elif [ $version -ge "3" ]; then
          					echo "---- Running v3 lockfile generator"
          					node veracode-helper/helper/yarn-lock-file-generator-v3.js --folder /home/runner/work/veracode/veracode
          				fi
          			fi
          		fi
          	else
                          echo "- The package.json file exists, but it does not contain 'workspaces'."
          	fi
          else
          	echo "The package.json file does not exist."
          fi
          rm -rf veracode-helper

      - name: Find yarn JS apps using workspaces - Windows
        shell: pwsh
        if: contains(runner.os, 'Windows')
        run: |
          if ((Test-Path "package.json") -and (Test-Path "pnpm-lock.yaml") -and (Test-Path "pnpm-workspace.yaml")) {
          Write-Host "- The files package.json, pnpm-lock.yaml, and pnpm-workspace.yaml exist. This looks like a PNPM workspace project."
              $packageJson = Get-Content "package.json" -Raw
              if ($packageJson -match '"workspaces"') {
                  Write-Host "-- The package.json file contains workspaces - running PNPM lockfile generator"
                  node "veracode-helper/helper/pnpm-helper.js" `
                    --folder "/home/runner/work/veracode/veracode" `
                    --intRepoPrefix "${{ github.event.client_payload.repository.owner }}" `
                    --repoName "${{ github.event.client_payload.repository.name }}"
              }
              else {
                  Write-Host "-- The package.json file does not contain workspaces - exiting"
              }
            }
            elseif ((Test-Path "package.json") -and -not (Test-Path "pnpm-lock.yaml") -and -not (Test-Path "pnpm-workspace.yaml")) {
                $packageJson = Get-Content "package.json" -Raw
                if ($packageJson -match '"workspaces"') {
                    Write-Host "- The package.json file exists and contains 'workspaces'."
                    if ($packageJson -match '"yarn"') {
                        Write-Host "-- Yarn was identified in the package.json file"
                        $match = Select-String '"yarn"' package.json | Select-Object -First 1
                        $version = ($match.Line -split '\D+' | Where-Object { $_ -match '^\d+$' } | Select-Object -First 1)
                        if (-not $version) {
                            Write-Host "-- The yarn version could not be identified."
                        }
                        else {
                            Write-Host "-- The yarn version is: $version"
                            if ([int]$version -lt 3) {
                                Write-Host "---- Running v2 lockfile generator"
                                node "veracode-helper/helper/yarn-lock-file-generator-v2.js" --folder "/home/runner/work/veracode/veracode"
                            }
                            elseif ([int]$version -ge 3) {
                                Write-Host "---- Running v3 lockfile generator"
                                node "veracode-helper/helper/yarn-lock-file-generator-v3.js" --folder "/home/runner/work/veracode/veracode"
                            }
                        }
                    }
                    else {
                        Write-Host "- Yarn was not identified in the package.json file"
                    }
                }
                else {
                    Write-Host "- The package.json file exists, but it does not contain 'workspaces'."
                }
            }
            else {
                Write-Host "The package.json file does not exist."
            }
            Remove-Item -Recurse -Force "veracode-helper" -ErrorAction SilentlyContinue

      - name: Check out to get veracode CLI
        uses: actions/checkout@v6
        with:
          path: 'veracode-helper'
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          # veracode.yml is included so the severity gate can read
          # break_build_severity_threshold directly from it at scan time.
          sparse-checkout: |
            helper/cli/*
            veracode.yml

      - name: Run Veracode SCA
        env:
          SRCCLR_API_TOKEN: ${{ secrets.VERACODE_AGENT_TOKEN }}
          JAVA_OPTS: -Xms2g -Xmx4g
          VERACODE_API_KEY_ID: '${{ secrets.VERACODE_API_ID }}'
          VERACODE_API_KEY_SECRET: '${{ secrets.VERACODE_API_KEY }}'
        uses: veracode/veracode-sca@v2.1.19
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          create-issues: false
          recursive: true
          allow-dirty: true
          # The agent-based scan gates on the SCA workspace policy. Leave this
          # as configured; the severity gate below is the enforcing control.
          breakBuildOnPolicyFindings: ${{ github.event.client_payload.user_config.break_build_policy_findings }}
          debug: ${{ github.event.client_payload.user_config.debug }}
          sca_fix_enabled: ${{ github.event.client_payload.user_config.sca_fix_enabled }}
          profile_name: ${{ github.event.client_payload.user_config.profile_name }}
          pr_number: ${{ github.event.client_payload.pr_number }}

      # ---------------------------------------------------------------------
      # Severity gate (added). Breaks the build on SCA findings at or above a
      # configurable threshold. The threshold is read from
      # break_build_severity_threshold in veracode.yml (see that file for the
      # documented values and resolution order). With create-issues:false the
      # agent writes scaResults.txt; with create-issues:true it writes
      # scaResults.json. The gate handles both.
      # ---------------------------------------------------------------------
      - name: Veracode SCA severity gate - Linux
        if: ${{ always() && contains(runner.os, 'Linux') }}
        shell: bash
        env:
          SECTION: veracode_sca_scan
          # Fallbacks if the key is absent from veracode.yml.
          USER_CONFIG_THRESHOLD: ${{ github.event.client_payload.user_config.break_build_severity_threshold }}
          VAR_THRESHOLD: ${{ vars.VERACODE_FAIL_SEVERITY }}
          # For the PR scan-summary comment and source links (no check run is
          # created, so the gate does not add its own entry to the repo Checks).
          GH_TOKEN: ${{ github.event.client_payload.token }}
          SCAN_REPO: ${{ github.event.client_payload.repository.full_name }}
          HEAD_SHA: ${{ github.event.client_payload.sha }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -uo pipefail

          fail_closed() {
            echo "::error::$1"
            exit 2
          }

          [ -f veracode-helper/helper/cli/veracode_severity_gate.py ] || fail_closed "Gate script missing (helper checkout failed); cannot gate. Failing closed."

          # Inline threshold resolver (self-contained; no external helper file).
          read_threshold() {
            awk -v section="$1" '
              $0 ~ "^"section":[ \t]*$" {inblk=1; next}
              /^[^[:space:]#]/ {inblk=0}
              inblk && /^[ \t]*break_build_severity_threshold[ \t]*:/ {
                line=$0
                sub(/^[ \t]*break_build_severity_threshold[ \t]*:[ \t]*/, "", line)
                sub(/#.*/, "", line)
                print line; exit
              }' "$2" 2>/dev/null | sed "s/[\"']//g" | sed "s/[[:space:]]*\$//"
          }
          THRESHOLD=""
          [ -f ./veracode.yml ] && THRESHOLD="$(read_threshold "$SECTION" ./veracode.yml)"
          if [ -z "$THRESHOLD" ] && [ -f veracode-helper/veracode.yml ]; then
            THRESHOLD="$(read_threshold "$SECTION" veracode-helper/veracode.yml)"
          fi
          [ -n "$THRESHOLD" ] || THRESHOLD="${USER_CONFIG_THRESHOLD:-}"
          [ -n "$THRESHOLD" ] || THRESHOLD="${VAR_THRESHOLD:-}"
          [ -n "$THRESHOLD" ] || THRESHOLD="medium"
          echo "Resolved SCA severity threshold: $THRESHOLD"

          # The agent writes scaResults.txt (create-issues:false) or
          # scaResults.json (create-issues:true). A missing file means the scan
          # did not run, so fail closed rather than passing silently.
          if [ -f scaResults.json ]; then
            RESULTS=scaResults.json
          elif [ -f scaResults.txt ]; then
            RESULTS=scaResults.txt
          else
            fail_closed "No SCA results file (scaResults.txt/json) found; the scan may not have run. Failing closed."
          fi
          echo "Gating SCA results in '$RESULTS' at threshold '$THRESHOLD'."
          python3 veracode-helper/helper/cli/veracode_severity_gate.py \
            --mode sca --input "$RESULTS" --threshold "$THRESHOLD" \
            --pr-comment sca
          rc=$?
          exit "$rc"

      - name: Veracode SCA severity gate - Windows
        if: ${{ always() && contains(runner.os, 'Windows') }}
        shell: pwsh
        env:
          SECTION: veracode_sca_scan
          USER_CONFIG_THRESHOLD: ${{ github.event.client_payload.user_config.break_build_severity_threshold }}
          VAR_THRESHOLD: ${{ vars.VERACODE_FAIL_SEVERITY }}
        run: |
          $ErrorActionPreference = "Stop"

          function Read-Threshold($section, $path) {
            if (-not (Test-Path $path)) { return "" }
            $inblk = $false
            $header = "^" + [regex]::Escape($section) + ":\s*$"
            foreach ($line in Get-Content $path) {
              if ($line -match $header) { $inblk = $true; continue }
              if ($line -match '^[^\s#]') { $inblk = $false }
              if ($inblk -and $line -match '^\s*break_build_severity_threshold\s*:\s*(.+?)\s*(#.*)?$') {
                return ($matches[1] -replace '["'']', '').Trim()
              }
            }
            return ""
          }

          $threshold = ""
          if (Test-Path ./veracode.yml) { $threshold = Read-Threshold $env:SECTION ./veracode.yml }
          if ([string]::IsNullOrEmpty($threshold) -and (Test-Path veracode-helper/veracode.yml)) {
            $threshold = Read-Threshold $env:SECTION veracode-helper/veracode.yml
          }
          if ([string]::IsNullOrEmpty($threshold)) { $threshold = $env:USER_CONFIG_THRESHOLD }
          if ([string]::IsNullOrEmpty($threshold)) { $threshold = $env:VAR_THRESHOLD }
          if ([string]::IsNullOrEmpty($threshold)) { $threshold = "medium" }
          Write-Host "Resolved SCA severity threshold: $threshold"

          if (Test-Path "scaResults.json") { $results = "scaResults.json" }
          elseif (Test-Path "scaResults.txt") { $results = "scaResults.txt" }
          else {
            Write-Host "::error::No SCA results file found; the scan may not have run. Failing closed."
            exit 2
          }
          Write-Host "Gating SCA results in '$results' at threshold '$threshold'."
          python veracode-helper/helper/cli/veracode_severity_gate.py `
            --mode sca --input $results --threshold $threshold
          exit $LASTEXITCODE
