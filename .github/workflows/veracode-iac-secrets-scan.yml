name: Veracode IaC/Secrets Scanning

run-name: Veracode IaC/Secrets Scanning - ${{ github.event.client_payload.repository.name }}

concurrency:
  group: ${{ github.event.client_payload.event_type }}-${{ github.event.client_payload.repository.name }}-${{ github.event.client_payload.repository.branch }}
  cancel-in-progress: true

on:
  repository_dispatch:
    types: [veracode-iac-secrets-scan]
    
jobs:
  cleanup:
    uses: ./.github/workflows/veracode-clean-up.yml
    with:
      runs_on: ${{ github.event.client_payload.user_config.default_runs_on }}

  register:
    needs: cleanup
    uses: ./.github/workflows/veracode-check-run.yml
    with:
      check_run_name: ${{ github.workflow }}
      head_sha: ${{ github.event.client_payload.sha }}
      repository_owner: ${{ github.event.client_payload.repository.owner }}
      repository_name: ${{ github.event.client_payload.repository.name }}
      event_type: ${{ github.event.client_payload.event_type }}
      github_token: ${{ github.event.client_payload.token }}
      run_id: ${{ github.run_id }}
      branch: ${{ github.event.client_payload.repository.branch }}
      default_runs_on: ${{ github.event.client_payload.user_config.default_runs_on }}

  validations:
    needs: register
    runs-on: ${{ fromJson(github.event.client_payload.user_config.default_runs_on) }}
    name: Validations
    steps:
      - name: Verify Veracode API credentials
        id: verify_api_creds
        uses: Veracode/github-actions-integration-helper@v0.1.10
        with:
          action: validateVeracodeApiCreds
          token: ${{ github.event.client_payload.token }}
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          appname: ${{ github.event.client_payload.user_config.profile_name }}
          source_repository: ${{ github.event.client_payload.repository.full_name }}
          check_run_id: ${{ needs.register.outputs.run_id }}
  
  veracode-iac-secrets-scan:
    needs: [register, validations]
    runs-on: ${{ fromJson(github.event.client_payload.user_config.default_runs_on) }}
    name: Veracode IaC/Secrets Scanning

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.client_payload.repository.full_name }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ github.event.client_payload.token }}

      - name: Run Veracode IaC/Secrets Scanning
        # NOTE ON PINNING: the v1.0.1 release tag uploads its results artifact
        # through GitHub's deprecated artifact backend, which now returns HTTP
        # 400 ("Create Artifact Container failed"). When that upload fails, the
        # Veracode Workflow App has no artifact to read, so its
        # "Veracode IaC/Secrets Scanning" check panel renders empty. The fixed
        # artifact code (upgraded @actions/artifact for v4) is on main but not
        # yet in a release tag, so this is pinned to main to keep that panel
        # populated. For supply-chain hardening, pin to main's commit SHA and
        # re-pin to a release once one ships with the artifact fix.
        uses: veracode/container_iac_secrets_scanning@main
        # continue-on-error: the severity gate below runs its own scan and is
        # the enforcing control, so any failure inside this action (for example
        # a future artifact-backend regression) must not fail the job on its own.
        continue-on-error: true
        with:
            vid: ${{ secrets.VERACODE_API_ID }}
            vkey: ${{ secrets.VERACODE_API_KEY }}
            command: "scan" 
            type: "directory"
            source: "./"
            format: "json"
            debug: ${{ github.event.client_payload.user_config.debug }}
            # IaC has no policy connection to app profiles. Keep the action for
            # PR decoration and SBOM generation, but disable its build break and
            # let the severity gate below be the single enforcing control.
            fail_build: false

      # ---------------------------------------------------------------------
      # Deterministic scan to JSON + severity gate (added).
      # The gate runs its own scan with the bundled Veracode CLI, then evaluates
      # misconfigurations, secrets, and vulnerabilities. The CLI is staged in
      # RUNNER_TEMP and the helper checkout is removed before scanning, so the
      # scan sees only your repository (a CLI binary left in the tree would
      # otherwise add its own Go dependencies as findings). The threshold is read
      # from break_build_severity_threshold in veracode.yml. The rendered table
      # is published to a check run on the scanned repo so it appears in the PR
      # Checks panel, and to the job summary.
      # Implemented for Linux runners (the bundled CLI is linux_x86).
      # always(): runs even if the action above failed, so the gate is never
      # skipped by the action's artifact crash.
      # ---------------------------------------------------------------------
      - name: Check out Veracode CLI and gate config
        if: ${{ always() && contains(runner.os, 'Linux') }}
        uses: actions/checkout@v6
        with:
          path: 'veracode-helper'
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          # veracode.yml is included so the gate can read
          # break_build_severity_threshold directly from it at scan time.
          sparse-checkout: |
            helper/cli/*
            veracode.yml

      - name: Veracode IaC/Secrets severity gate
        if: ${{ always() && contains(runner.os, 'Linux') }}
        shell: bash
        env:
          SECTION: veracode_iac_secrets_scan
          # Fallbacks if the key is absent from veracode.yml.
          USER_CONFIG_THRESHOLD: ${{ github.event.client_payload.user_config.break_build_severity_threshold }}
          VAR_THRESHOLD: ${{ vars.VERACODE_FAIL_SEVERITY }}
          VERACODE_API_KEY_ID: ${{ secrets.VERACODE_API_ID }}
          VERACODE_API_KEY_SECRET: ${{ secrets.VERACODE_API_KEY }}
          # For the PR scan-summary comment and source links (no check run is
          # created, so the gate does not add its own entry to the repo Checks).
          GH_TOKEN: ${{ github.event.client_payload.token }}
          SCAN_REPO: ${{ github.event.client_payload.repository.full_name }}
          HEAD_SHA: ${{ github.event.client_payload.sha }}
          # Link file locations to the branch (matches the pipeline gate)
          # so they resolve consistently regardless of the dispatch SHA.
          BLOB_REF: ${{ github.event.client_payload.repository.branch }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -uo pipefail

          fail_closed() {
            echo "::error::$1"
            exit 2
          }

          [ -d veracode-helper/helper/cli ] || fail_closed "Veracode CLI helper checkout is missing; cannot gate. Failing closed."

          # Stage the CLI and gate assets in a unique temp dir OUTSIDE the
          # scanned tree, and remove the helper checkout before scanning.
          TOOLS="$(mktemp -d "${RUNNER_TEMP:-/tmp}/veracode-gate.XXXXXX")"
          trap 'rm -rf "$TOOLS"' EXIT
          cp veracode-helper/helper/cli/veracode_severity_gate.py "$TOOLS/" || fail_closed "Gate script missing. Failing closed."
          if [ -f veracode-helper/veracode.yml ]; then
            cp veracode-helper/veracode.yml "$TOOLS/integration-veracode.yml"
          fi
          TARBALL="$(ls veracode-helper/helper/cli/veracode-cli_*_linux_x86.tar.gz 2>/dev/null | head -n1 || true)"
          [ -n "$TARBALL" ] || fail_closed "No Veracode CLI tarball found under helper/cli. Failing closed."
          tar -xzf "$TARBALL" -C "$TOOLS" --strip-components=1 || fail_closed "Could not extract the Veracode CLI. Failing closed."
          [ -x "$TOOLS/veracode" ] || fail_closed "Veracode CLI did not extract correctly. Failing closed."
          rm -rf veracode-helper

          # Inline threshold resolver (self-contained; no external helper file).
          # Section-aware: reads break_build_severity_threshold from a veracode.yml
          # section, stopping at the next top-level block.
          read_threshold() {
            awk -v section="$1" '
              $0 ~ "^"section":[ \t]*$" {inblk=1; next}
              /^[^[:space:]#]/ {inblk=0}
              inblk && /^[ \t]*break_build_severity_threshold[ \t]*:/ {
                line=$0
                sub(/^[ \t]*break_build_severity_threshold[ \t]*:[ \t]*/, "", line)
                sub(/#.*/, "", line)
                print line; exit
              }' "$2" 2>/dev/null | sed "s/[\"']//g" | sed "s/[[:space:]]*\$//"
          }
          THRESHOLD=""
          [ -f ./veracode.yml ] && THRESHOLD="$(read_threshold "$SECTION" ./veracode.yml)"
          if [ -z "$THRESHOLD" ] && [ -f "$TOOLS/integration-veracode.yml" ]; then
            THRESHOLD="$(read_threshold "$SECTION" "$TOOLS/integration-veracode.yml")"
          fi
          [ -n "$THRESHOLD" ] || THRESHOLD="${USER_CONFIG_THRESHOLD:-}"
          [ -n "$THRESHOLD" ] || THRESHOLD="${VAR_THRESHOLD:-}"
          [ -n "$THRESHOLD" ] || THRESHOLD="medium"
          echo "Resolved IaC/Secrets severity threshold: $THRESHOLD"

          # Scan only the repository. The CLI may exit non-zero on findings, so
          # capture its status and require a non-empty results file.
          scan_status=0
          "$TOOLS/veracode" scan --type directory --source ./ \
            --format json --output "$TOOLS/results.json" || scan_status=$?
          [ -s "$TOOLS/results.json" ] || fail_closed "Veracode CLI produced no results (scan exit ${scan_status}). Failing closed."

          python3 "$TOOLS/veracode_severity_gate.py" \
            --mode iac --input "$TOOLS/results.json" --threshold "$THRESHOLD" \
            --pr-comment iac
          rc=$?
          exit "$rc"

      - name: Veracode IaC/Secrets gate unsupported OS guard
        # The bundled CLI is linux_x86. On non-Linux runners the gate cannot run,
        # so fail loudly and closed rather than letting the build pass ungated.
        if: ${{ always() && !contains(runner.os, 'Linux') }}
        shell: bash
        run: |
          echo "::error::The Veracode IaC/Secrets severity gate supports Linux runners only (bundled CLI is linux_x86). Runner OS: ${{ runner.os }}. Failing closed. Use a Linux runner for this scan."
          exit 1
